<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetPals - Crear Cuenta</title>
    <link rel="icon" href="img/salud.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-paw"></i> PetPals</h1>
        <p>Plataforma de gestión de mascotas y citas veterinarias</p>
    </header>

    <nav class="navbar navbar-expand-md">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Mostrar menú">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <a href="LoginUribe.html"><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</a>
                <a href="VistaVeterinario.html"><i class="fa-solid fa-user-doctor"></i> Vista Veterinario</a>
                <a href="VistaUsuario.html"><i class="fa-solid fa-user"></i> Vista Usuario</a>
                <a href="ContactoUribe.html"><i class="fa-solid fa-address-book"></i> Información Contacto</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="registro-principal">
            <h2><i class="fa-solid fa-user-plus"></i> Crear Cuenta</h2>

            <form action="#" class="formulario-registro">
                <fieldset class="fieldset-registro">
                    <legend>
                        <i class="fa-solid fa-id-card"></i> Datos Personales
                    </legend>

                    <label>Nombres:</label>
                    <input type="text" placeholder="Ingresa tus nombres" required>

                    <label>Apellidos:</label>
                    <input type="text" placeholder="Ingresa tus apellidos" required>

                    <label>Cédula:</label>
                    <input type="text" placeholder="Ingresa tu número de cédula" required>

                    <label>Fecha de nacimiento:</label>
                    <input type="date" required>

                    <label>Género:</label>
                    <select>
                        <option value="" disabled selected>Selecciona tu género</option>
                        <option value="m">Masculino</option>
                        <option value="f">Femenino</option>
                        <option value="o">Otro</option>
                    </select>

                    <label>Correo electrónico:</label>
                    <input type="email" placeholder="ejemplo@correo.com" required>

                    <label>Contraseña:</label>
                    <input type="password" placeholder="Mínimo 8 caracteres" required>
                </fieldset>

                <button type="submit" class="btn-registrar">
                    <i class="fa-solid fa-floppy-disk"></i> Registrarme
                </button>
            </form>

            <p class="nota-registro">
                ¿Ya tienes cuenta? <a href="LoginUribe.html">Inicia sesión aquí</a>
            </p>
        </section>
    </main>

    <footer>
        <p>© PetPals 2026 - Proyecto Fundamentos Web</p>
        <p>Universidad de las Fuerzas Armadas ESPE</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
